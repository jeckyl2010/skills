version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Copenhagen
    labels: [dependencies, github-actions]
    groups:
      github-actions:
        patterns: ["*"]
    commit-message:
      prefix: ci
    open-pull-requests-limit: 10
