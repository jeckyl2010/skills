name: Checks

on:
  workflow_call:
    secrets: {}

permissions: {}

jobs:
  validate:
    name: Validate skills
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install jsonschema pyyaml

      - name: Run skill validator
        run: python3 scripts/validate.py

  index-fresh:
    name: Index staleness check
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pyyaml

      - name: Regenerate index and check for diff
        run: |
          python3 scripts/index_builder.py
          if ! git diff --exit-code index.yaml; then
            echo ""
            echo "index.yaml is out of date. Run python3 scripts/index_builder.py locally and commit the result."
            exit 1
          fi

  gitleaks:
    name: Secret scan
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
