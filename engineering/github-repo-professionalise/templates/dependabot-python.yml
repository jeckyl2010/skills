version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Copenhagen    # adjust to maintainer timezone
    labels: [dependencies, github-actions]
    groups:
      github-actions:
        patterns: ["*"]
    commit-message:
      prefix: ci
    open-pull-requests-limit: 10

  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Copenhagen
    labels: [dependencies, python]
    versioning-strategy: increase-if-necessary
    groups:
      python-deps:
        patterns: ["*"]
    commit-message:
      prefix: chore
      include: scope
    open-pull-requests-limit: 10
