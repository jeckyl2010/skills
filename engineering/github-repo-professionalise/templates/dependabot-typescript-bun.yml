version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Copenhagen    # adjust to maintainer timezone
    labels: [dependencies, github-actions]
    groups:
      github-actions:
        patterns: ["*"]
    commit-message:
      prefix: ci
    open-pull-requests-limit: 10

  - package-ecosystem: npm
    directory: /web                  # adjust to where package.json lives
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Copenhagen
    labels: [dependencies, npm]
    groups:
      npm:
        patterns: ["*"]
    commit-message:
      prefix: chore
    open-pull-requests-limit: 10
